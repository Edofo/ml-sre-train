apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-recommender
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Edofo/ml-sre-train
    targetRevision: main
    path: infra/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: recommender-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
