apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-slo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Edofo/ml-sre-train
    targetRevision: main
    path: observability/slo
    directory:
      include: rules.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
